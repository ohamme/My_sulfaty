name: sulafati
description: "Sulafati - Salaf Management Application"

publish_to: 'none'

version: 0.2.0+1

environment:
  sdk: ^3.12.2


dependencies:

  flutter:
    sdk: flutter


  # State Management
  provider: ^6.1.5


  # Local Database
  sqflite: ^2.4.2
  path: ^1.9.1


  # Generate Unique IDs
  uuid: ^4.5.1


  # JSON & Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0


  # Icons
  cupertino_icons: ^1.0.8



dev_dependencies:

  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


  # Code Generation
  build_runner: ^2.7.0
  freezed: ^3.2.3
  json_serializable: ^6.11.1



flutter:

  generate: true

  uses-material-design: true